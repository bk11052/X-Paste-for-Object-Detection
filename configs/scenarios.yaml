# Scenario definitions for Scenario-aware Copy-Paste Augmentation
#
# Each scenario specifies:
#   - background_prompt_seed: short seed phrase for GPT to expand into detailed SDXL prompts
#                             (object names should NOT appear here — backgrounds are object-free)
#   - background_negative: SDXL negative prompt to suppress objects in the background
#   - instances: list of {category, pose, count, distance_bias}
#       category: tank | soldier | car
#       pose: token used for SD 1.5 instance pool generation prompt (e.g. "walking soldier")
#       count: number of instances to paste in the final composed image
#       distance_bias: near | mid | far  (controls which depth band is preferred for paste)
#       (instances marked "background crowd" add training variety as small, far instances)
#   - n_backgrounds: number of background variants to generate per scenario (for paper figure + training)
#
# These are SEED definitions. Detailed SDXL prompts are produced by gen_scenario_prompts.py via GPT.

global:
  image_size: [1024, 576]   # 16:9 widescreen, native SDXL ratio
  shared_negative: >
    cartoon, anime, lowres, blurry, jpeg artifacts, distorted, deformed,
    text, watermark, signature, oversaturated, painting, drawing,
    soldiers, people, person, human, vehicles, tanks, cars, trucks,
    weapons, military equipment

scenarios:

  - id: 1
    name: walking_soldier
    title_kr: "걸어오는 군인"
    background_prompt_seed: "urban combat street with smoke in distance, photorealistic war photography, no people, empty road"
    background_negative: ""
    instances:
      - {category: soldier, pose: "walking soldier in tactical gear, full body, side view", count: 1, distance_bias: near}
      # background crowd
      - {category: soldier, pose: "standing soldier in tactical gear", count: 2, distance_bias: far}
    n_backgrounds: 16

  - id: 2
    name: squad_cluster
    title_kr: "분대 군집"
